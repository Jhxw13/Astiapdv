appId: com.vyndeveloper.astiapdv.cliente
productName: ASTIA PDV Cliente
copyright: ASTIA PDV

directories:
  output: release/cliente
  buildResources: public

files:
  - src/main/index.js
  - src/main/preload.js
  - package.json
  - node_modules/**/*
  - "!node_modules/better-sqlite3/**"
  - "!node_modules/bcryptjs/**"
  - "!node_modules/.cache/**"
  - "!node_modules/electron-builder/**"
  - "!node_modules/@electron/rebuild/**"

extraMetadata:
  main: src/main/index.js
  build_mode: client

asar: false

win:
  target:
    - target: nsis
      arch: [x64]
  icon: public/icon.png

nsis:
  oneClick: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ASTIA PDV Cliente
  language: 1046
  include: build/installer.nsh

publish:
  provider: github
  owner: Jhxw13
  repo: astia1.0
